models:
  - name: dim_listings_cleanse
    columns: 
    - name: listing_id
      date_tests:
      - unique
      - not null

  - name: host_id
    data_test: 
    - not null
    - relationship:
      arguments:
      to: ref('dim_hosts_cleansed')
      field: host_id

  - name: room_type
    data_test:
    - accepted_values:
        arguments:
          values ['Entire home/apt',
                        'Private room',
                        'Shared room',
                        'Hotel room']